<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Crossing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 3px solid #333;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script src="js/sprites/renderer.js"></script>
    <script src="js/sprites/characters.js"></script>
    <script src="js/sprites/vehicles.js"></script>
    <script src="js/sprites/environment.js"></script>
    <script src="js/sprites/ui.js"></script>
    <script src="js/engine/input.js"></script>
    <script src="js/engine/collision.js"></script>
    <script src="js/engine/sound.js"></script>
    <script src="js/engine/stages.js"></script>
    <script src="js/engine/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
